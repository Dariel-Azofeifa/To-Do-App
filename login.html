<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do Dariel — Login</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">

            <h1 class="auth-title">To-Do Dariel</h1>

            <!-- Tabs -->
            <div class="auth-tabs">
                <button class="tab active" id="tab-login">Iniciar sesión</button>
                <button class="tab" id="tab-register">Registrarse</button>
            </div>

            <!-- Mensaje de error/éxito -->
            <div class="auth-message" id="auth-message"></div>

            <!-- FORM LOGIN -->
            <form class="auth-form active" id="form-login">
                <div class="input-group">
                    <label for="login-email">Email</label>
                    <input type="email" id="login-email" placeholder="correo@ejemplo.com" required />
                    <span class="field-error" id="err-login-email"></span>
                </div>
                <div class="input-group">
                    <label for="login-password">Contraseña</label>
                    <input type="password" id="login-password" placeholder="Tu contraseña" required />
                    <span class="field-error" id="err-login-password"></span>
                </div>
                <button type="submit" class="btn-primary" id="btn-login">Entrar</button>
            </form>

            <!-- FORM REGISTER -->
            <form class="auth-form" id="form-register">
                <div class="input-group">
                    <label for="reg-username">Username</label>
                    <input type="text" id="reg-username" placeholder="tu_nombre" required />
                    <span class="field-error" id="err-reg-username"></span>
                </div>
                <div class="input-group">
                    <label for="reg-email">Email</label>
                    <input type="email" id="reg-email" placeholder="correo@ejemplo.com" required />
                    <span class="field-error" id="err-reg-email"></span>
                </div>
                <div class="input-group">
                    <label for="reg-password">Contraseña</label>
                    <input type="password" id="reg-password" placeholder="Mínimo 6 caracteres" required />
                    <span class="field-error" id="err-reg-password"></span>
                </div>
                <button type="submit" class="btn-primary" id="btn-register">Crear cuenta</button>
            </form>

        </div>
    </div>
    <script src="login.js" defer></script>
</body>
</html>
